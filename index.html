<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Novabase Hub - Gateway to the Cloudflare Workers API for storage browsing.">
  <meta name="theme-color" content="#f97316">
  <title>Novabase Hub · Storage Gateway</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;00&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/login.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
          }
        }
      }
    }
  </script>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('novabase.theme');
        var theme = stored || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>

  <noscript>
    <div style="padding:32px;text-align:center;font-family:sans-serif;">
      This application requires JavaScript to run. Please enable JavaScript in your browser.
    </div>
  </noscript>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
